<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer black circle -->
  <circle cx="50" cy="50" r="50" fill="#0a0a0a"/>

  <!-- Thin white ring border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Inner white ring (double border effect matching logo) -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#ffffff" stroke-width="0.75"/>

  <!-- J letter - positioned left, slightly overlapping T -->
  <text
    x="29"
    y="63"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="46"
    fill="#ffffff"
    letter-spacing="-2"
    text-anchor="middle"
  >J</text>

  <!-- T letter - positioned right, slightly overlapping J -->
  <text
    x="63"
    y="63"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="46"
    fill="#ffffff"
    letter-spacing="-2"
    text-anchor="middle"
  >T</text>

  <!-- Subtle bottom stroke line (mimics logo's base detail) -->
  <line x1="24" y1="70" x2="76" y2="70" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
</svg>
