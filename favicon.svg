<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer black circle -->
  <circle cx="50" cy="50" r="50" fill="#0a0a0a"/>

  <!-- Outer white ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#ffffff" stroke-width="1.8"/>

  <!-- Inner white ring (double border effect) -->
  <circle cx="50" cy="50" r="42.5" fill="none" stroke="#ffffff" stroke-width="0.8"/>

  <!--
    LAYOUT LOGIC (matching original logo):
    - T sits HIGHER — its top crossbar is near the top of the circle
    - T's vertical stem runs down the center-right
    - J sits LOWER — its body is behind/under the T stem
    - J's hook curves down and left at the bottom
    - They share the center zone, T slightly right of center, J slightly left
    - Both are rendered with a black stroke outline so letters separate cleanly
  -->

  <!-- J — rendered FIRST so T stem sits on top of it -->
  <text
    x="40"
    y="68"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#ffffff"
    stroke="#0a0a0a"
    stroke-width="2"
    paint-order="stroke fill"
    text-anchor="middle"
  >J</text>

  <!-- T — rendered SECOND (on top), shifted right and UP so crossbar clears J's top -->
  <text
    x="58"
    y="58"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#ffffff"
    stroke="#0a0a0a"
    stroke-width="2"
    paint-order="stroke fill"
    text-anchor="middle"
  >T</text>
</svg>
